<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>पोलिस भरती २०२१ - मॉक टेस्ट</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #eef2f7; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 28px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1e4663; border-left: 6px solid #0077b6; padding-left: 16px; }
        .question-card { background: #f9fbfd; border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid #dee2e6; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #0b3b4f; }
        .option { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #ced4da; border-radius: 40px; padding: 10px 18px; margin: 10px 0; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #e9ecef; transform: translateX(5px); }
        .option.selected { background: #0077b6; color: white; border-color: #0077b6; }
        .option-prefix { font-weight: bold; width: 30px; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        button { background: #0077b6; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { background: #023e8a; transform: scale(1.02); }
        .back-btn { background: #6c757d; }
        .result-box { text-align: center; background: #d1e7f5; border-radius: 24px; padding: 20px; margin-top: 20px; }
        .score { font-size: 2.5rem; font-weight: 800; color: #0f67b3; }
        hr { margin: 20px 0; }
        footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #5f7d9c; }
        @media (max-width: 600px) { .container { padding: 15px; } .option { padding: 6px 12px; } }
    </style>
</head>

    <footer>© पोलिस भरती सराव संच</footer>
</div>

        { text: "'मराठी वृत्तपत्र' जनक?", options: ["बाळशास्त्री जांभेकर", "टिळक", "आगरकर", "फुले"], correct: 0 },
        { text: "भारताचे सर्वोच्च पद?", options: ["राष्ट्रपती", "पंतप्रधान", "गृहमंत्री", "सरन्यायाधीश"], correct: 0 },
        { text: "लोकशाही म्हणजे काय?", options: ["लोकांचे राज्य", "राजाचे राज्य", "हुकूमशाही", "यांपैकी नाही"], correct: 0 },
        { text: "महाराष्ट्र दिन?", options: ["१ मे", "१ जानेवारी", "१५ ऑगस्ट", "२६ जानेवारी"], correct: 0 },
        { text: "'सूर्य' कोणत्या दिशेला मावळतो?", options: ["पूर्व", "पश्चिम", "उत्तर", "दक्षिण"], correct: 1 },
        { text: "चहामध्ये कोणते उत्तेजक असते?", options: ["निकोटीन", "कॅफिन", "टॅनिन", "यांपैकी नाही"], correct: 1 },
        { text: "मानवी हृदय एका मिनिटात किती वेळा धडधडते?", options: ["७०-७५", "६०", "८०", "९०"], correct: 0 },
        { text: "'ताजमहाल' कोठे आहे?", options: ["दिल्ली", "आग्रा", "मुंबई", "पुणे"], correct: 1 },
        { text: "भारताचा राष्ट्रीय पक्षी?", options: ["मोर", "पोपट", "कावळा", "चिमणी"], correct: 0 },
        { text: "'इंद्रधनुष्यात' किती रंग असतात?", options: ["५", "६", "७", "८"], correct: 2 },
        { text: "'कोरोना'चा सर्वात पहिला रुग्ण कोठे सापडला?", options: ["चीन", "भारत", "अमेरिका", "इटली"], correct: 0 },
        { text: "'डिजिटल इंडिया' कोणाशी संबंधित आहे?", options: ["तंत्रज्ञान", "शेती", "उद्योग", "शिक्षण"], correct: 0 },
        { text: "पांढरा हत्ती कोणत्या देशात आढळतो?", options: ["थायलंड", "भारत", "जपान", "अमेरिका"], correct: 0 },
        { text: "भारताची राजधानी?", options: ["मुंबई", "दिल्ली", "कोलकाता", "चेन्नई"], correct: 1 }
    ];

    let userAnswers = new Array(totalQuestions).fill(-1);
    let currentIndex = 0;

    function renderQuestion() {
        const q = questions[currentIndex];
        let html = `<div class="question-card"><div class="question-text">❓ प्रश्न ${currentIndex+1}/${totalQuestions}<br>${q.text}</div>`;
        q.options.forEach((opt, idx) => {
            let isSelected = (userAnswers[currentIndex] === idx);
            html += `<div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${idx})">
                        <span class="option-prefix">${String.fromCharCode(65+idx)}.</span> ${opt}
                    </div>`;
        });
        html += `</div>`;
        document.getElementById("quizPanel").innerHTML = html;
        const nextBtn = document.getElementById("nextBtn");
        if (currentIndex === totalQuestions-1) nextBtn.innerHTML = "✅ निकाल पहा";
        else nextBtn.innerHTML = "पुढील प्रश्न ▶";
    }

    function selectOption(optIndex) {
        userAnswers[currentIndex] = optIndex;
        renderQuestion();
    }

    function nextQuestion() {
        if (currentIndex < totalQuestions-1) {
            currentIndex++;
            renderQuestion();
        } else {
            let score = 0;
            for (let i=0; i<totalQuestions; i++) {
                if (userAnswers[i] === questions[i].correct) score++;
            }
            let percent = (score/totalQuestions)*100;
            document.getElementById("quizPanel").innerHTML = `
                <div class="result-box">
                    <div class="score">🎯 ${score}/${totalQuestions}</div>
                    <p>टक्केवारी : ${percent.toFixed(1)}%</p>
                    <p>📊 बरोबर उत्तरे : ${score} &nbsp;&nbsp; ❌ चुकीची : ${totalQuestions-score}</p>
                    <button onclick="location.reload()">🔄 पुन्हा प्रयत्न करा</button>
                </div>
            `;
            document.getElementById("nextBtn").style.display = "none";
        }
    }

    function goBackHome() { window.location.href = "/"; }

    renderQuestion();
</script>
</body>
</html>
