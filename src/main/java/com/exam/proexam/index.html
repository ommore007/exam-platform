<!DOCTYPE html>
<html>
<head><title>मॉक टेस्ट</title></head>
<body>
<h1>📚 मॉक टेस्ट प्लॅटफॉर्म</h1>
<h2>श्रेणी निवडा:</h2>
{% for cat in categories %}
    <button onclick="selectCat('{{cat}}')">{{cat}}</button>
{% endfor %}
<div id="years"></div>
<div id="papers"></div>
<script>
    let cat = '';
    let years = {{ years|tojson }};
    function selectCat(c) {
        cat = c;
        let html = '<h2>वर्ष निवडा:</h2>';
        for(let y of years) html += `<button onclick="selectYear('${y}')">${y}</button>`;
        document.getElementById('years').innerHTML = html;
    }
    function selectYear(y) {
        let html = '<h2>प्रश्नपत्रिका निवडा:</h2>';
        for(let i=1; i<=10; i++) html += `<button onclick="location.href='/start/${cat}/${y}/${i}'">प्रश्नपत्रिका ${i}</button>`;
        document.getElementById('papers').innerHTML = html;
    }
</script>
</body>
</html>
